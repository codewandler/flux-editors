# Point the build at the locally-installed IDE — no platform download, runs your exact IDE.
# Comment this out to instead download platformType/platformVersion below.
localIdePath = /opt/intellij-idea-ultimate-edition

# Used only when localIdePath is empty.
#   platformType:    IC = IntelliJ IDEA Community, IU = Ultimate, RR = RustRover, CL = CLion
#   platformVersion: the IDE build to download (e.g. 2024.3.5, 2025.2.4)
platformType = IU
platformVersion = 2025.2.4

pluginVersion = 0.1.0
# 243 = the 2024.3 branch. Bump if you raise platformVersion's major.
pluginSinceBuild = 243

# Give the daemon room. Configuration cache is off for now — it can be fiddly with runIde.
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.configuration-cache = false
org.gradle.caching = true
